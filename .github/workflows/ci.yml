name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-tray/src-tauri

      - name: Install Linux GUI deps (for cargo check/clippy)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libglib2.0-dev \
            libxdo-dev librsvg2-dev libayatana-appindicator3-dev libssl-dev

      - run: npm ci

      - name: Prettier
        run: npx prettier --check .

      - name: ESLint
        run: npx eslint .

      - name: Frontend typecheck + build
        run: npm run build

      - name: cargo fmt
        run: cargo fmt --manifest-path apps/desktop-tray/src-tauri/Cargo.toml --check

      - name: cargo clippy
        run: cargo clippy --manifest-path apps/desktop-tray/src-tauri/Cargo.toml --all-targets --features testkit -- -D warnings

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-tray/src-tauri

      - name: Install Linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libglib2.0-dev \
            libxdo-dev librsvg2-dev libayatana-appindicator3-dev libssl-dev

      - name: cargo test
        run: cargo test --manifest-path apps/desktop-tray/src-tauri/Cargo.toml --features testkit

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx --prefix apps/desktop-tray/ui playwright install --with-deps chromium

      - name: Run Playwright
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/desktop-tray/ui/playwright-report/
          retention-days: 7

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-tray/src-tauri

      - name: cargo-audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --file apps/desktop-tray/src-tauri/Cargo.lock

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high

  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-tray/src-tauri

      - name: Install Linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libglib2.0-dev \
            libxdo-dev librsvg2-dev libayatana-appindicator3-dev libssl-dev

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage
        run: |
          cargo llvm-cov --manifest-path apps/desktop-tray/src-tauri/Cargo.toml \
            --features testkit --lcov --output-path lcov.info

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Soft threshold (informational; see docs/testing.md)
        run: |
          cargo llvm-cov --manifest-path apps/desktop-tray/src-tauri/Cargo.toml \
            --features testkit --fail-under-lines 50
